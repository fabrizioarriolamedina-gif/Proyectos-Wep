<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Calculadora Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Un poquito de estilo extra para centrar y dar color */
        body { background-color: #709ecb; }
        .calculadora-card {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background-color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="calculadora-card">
        <h2 class="text-center text-primary mb-4">MI CALCULADORA</h2>
        
        <form>
            <div class="mb-3">
                <label class="form-label">Primer número</label>
                <input type="number" id="primernumero" class="form-control" placeholder="Ingrese el primer número">
            </div>

            <div class="mb-3">
                <label class="form-label">Segundo número</label>
                <input type="number" id="segundonumero" class="form-control" placeholder="Ingrese el segundo número">
            </div>

            <div class="mb-4">
                <label class="form-label">¿Qué desea hacer?</label>
                <select id="opciones" class="form-select">
                    <option value="suma">Suma</option>
                    <option value="resta">Resta</option>
                    <option value="multiplicacion">Multiplicación</option>
                    <option value="divicion">División</option>
                </select>
            </div>

            <div class="d-grid gap-2">
                <button type="button" class="btn btn-primary" onclick="calcular()">Calcular</button>
                <button type="button" class="btn btn-outline-danger btn-sm" onclick="limpiar()">Limpiar</button>
            </div>

            <div class="mt-4 text-center border-top pt-3">
                <h5>Resultado:</h5>
                <p id="resultado" class="fs-4 fw-bold text-success">0</p>
            </div>
        </form>
    </div>
</div>

<script>
    function calcular(){
        let input1 = document.getElementById("primernumero");
        let input2 = document.getElementById("segundonumero");
        let listaOpciones = document.getElementById("opciones");
        
        let n1 = parseFloat(input1.value);
        let n2 = parseFloat(input2.value);
        let operacion = listaOpciones.value;
        let resultado = 0;

        switch (operacion){
            case 'suma':
                resultado = n1 + n2;
                break;
            case 'resta':
                resultado = n1 - n2;
                break;
            case 'multiplicacion': 
                resultado = n1 * n2;
                break;
            case 'divicion':
                if(n2 == 0) {
                    resultado = "Error: Div / 0";
                } else {
                    resultado = n1 / n2;
                }
                break;
        }
        document.getElementById("resultado").innerHTML = resultado;
    }
    function limpiar(){
        document.getElementById("primernumero").value = "";
        document.getElementById("segundonumero").value = "";
        document.getElementById("resultado").innerHTML = "0"; 
    }
</script>
</body>
</html>
